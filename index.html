<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS | Academic Risk Intelligence System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0f1923;--ink-2:#2d3d4f;--ink-3:#5a6e82;--ink-4:#8fa3b5;
  --surface:#f4f6f9;--surface-2:#edf0f4;--white:#ffffff;
  --border:#dde3ea;--border-2:#c8d1db;
  --blue:#1a56c4;--blue-dark:#1240a0;--blue-light:#e8eef9;--blue-mid:#cdd9f3;
  --amber:#d97706;--amber-light:#fef3cd;
  --red:#dc2626;--red-light:#fee2e2;
  --green:#16a34a;--green-light:#dcfce7;
  --teal:#0891b2;--teal-light:#e0f7fa;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --gold:#f59e0b;--gold-light:#fef9e7;
  --sidebar-w:240px;--sidebar-collapsed-w:68px;
  --radius:10px;--radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05);
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;font-size:14px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1923 0%,#1a3560 55%,#1a56c4 100%);padding:1.5rem;position:relative;overflow:hidden;}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 40%,rgba(26,86,196,.35) 0%,transparent 70%);}
.login-wrap::after{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;border:1px solid rgba(255,255,255,.05);box-shadow:0 0 0 80px rgba(255,255,255,.02),0 0 0 160px rgba(255,255,255,.01);}
.login-card{background:var(--white);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:var(--shadow-lg);animation:slideUp .5s cubic-bezier(.22,.68,0,1.2) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:1.8rem;}
.login-logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1a56c4,#0891b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.login-logo i{color:white;font-size:1.1rem;}
.login-brand-text h2{font-size:1.25rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
.login-brand-text p{font-size:.75rem;color:var(--ink-3);margin-top:1px;}
.role-tabs{display:flex;background:var(--surface-2);border-radius:10px;padding:4px;gap:3px;margin-bottom:1.5rem;}
.role-tab{flex:1;padding:8px 4px;border-radius:7px;cursor:pointer;text-align:center;font-size:.7rem;font-weight:600;color:var(--ink-3);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:transparent;}
.role-tab i{font-size:1rem;}
.role-tab.active{background:var(--white);color:var(--blue);box-shadow:var(--shadow-sm);}
.login-field{margin-bottom:.9rem;}
.login-field label{display:block;font-size:.72rem;font-weight:600;color:var(--ink-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.login-field input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.875rem;font-family:inherit;color:var(--ink);background:var(--white);transition:all .2s;}
.login-field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,196,.1);}
.login-field input::placeholder{color:var(--ink-4);}
.login-btn{width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:-.01em;}
.login-btn:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,86,196,.35);}
.login-btn:active{transform:none;}
.demo-hint{margin-top:1.2rem;padding:1rem;background:var(--surface);border-radius:var(--radius);font-size:.7rem;color:var(--ink-3);line-height:1.6;}
.demo-hint strong{color:var(--ink-2);display:block;margin-bottom:4px;}
.login-error{color:var(--red);font-size:.78rem;margin-top:.5rem;display:none;padding:8px 12px;background:var(--red-light);border-radius:8px;}
.login-error.show{display:block;}

/* APP SHELL */
.app-shell{display:none;width:100%;min-height:100vh;}
.app-shell.active{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--ink);flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow:hidden;transition:width .3s ease;}
.sidebar.collapsed{width:var(--sidebar-collapsed-w);}
.sidebar-brand{padding:1rem 1.25rem .75rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);}
.sidebar.collapsed .sidebar-brand{justify-content:center;padding:1rem 0 .75rem;}
.sidebar.collapsed .sidebar-brand-text{display:none;}
.sidebar-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sidebar-logo i{color:white;font-size:.9rem;}
.sidebar-brand-text{font-size:1rem;font-weight:700;color:white;letter-spacing:-.02em;transition:opacity .3s;}
.sidebar-brand-sub{font-size:.6rem;color:rgba(255,255,255,.4);margin-top:1px;}
/* remove sidebar-user section completely */
.sidebar-nav{padding:.75rem .75rem 0;flex:1;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:.8rem;font-weight:500;transition:all .15s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;white-space:nowrap;}
.sidebar.collapsed .nav-item{justify-content:center; padding:9px 0;}
.sidebar.collapsed .nav-item span:not(.badge-pill){display:none;}
.nav-item i{width:16px;text-align:center;font-size:.85rem;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.nav-item.active{background:rgba(26,86,196,.4);color:white;}
.nav-item .badge-pill{margin-left:auto;background:var(--red);color:white;font-size:.6rem;padding:2px 6px;border-radius:20px;font-weight:700;}
.sidebar.collapsed .badge-pill{display:none;}
.sidebar-bottom{padding:.75rem;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:6px;}
.sidebar.collapsed .sidebar-bottom{align-items:center;}
.sidebar-action,.sidebar-toggle{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);font-size:.78rem;font-weight:500;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;}
.sidebar-action:hover,.sidebar-toggle:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);}
.sidebar-action i,.sidebar-toggle i{width:16px;text-align:center;font-size:.85rem;}
.sidebar.collapsed .sidebar-action span,.sidebar.collapsed .sidebar-toggle span{display:none;}
.sidebar.collapsed .sidebar-action,.sidebar.collapsed .sidebar-toggle{justify-content:center;padding:9px 0;}
.sidebar-toggle .chevron{transition:transform .3s;font-size:.8rem;}
.sidebar.collapsed .sidebar-toggle .chevron{transform:rotate(180deg);}

/* MAIN AREA */
.main-area{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column;position:relative;transition:margin-left .3s ease;}
.sidebar.collapsed + .main-area{margin-left:var(--sidebar-collapsed-w);}
/* Floating header icons */
.floating-header{position:absolute;top:1rem;right:1.5rem;display:flex;align-items:center;gap:.5rem;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);padding:.35rem .5rem;border-radius:40px;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
.floating-header .hdr-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all .15s;font-size:.85rem;position:relative;}
.floating-header .hdr-btn:hover{background:var(--blue-light);color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,196,.12);} /* circle appears on hover */
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid white;}
.hdr-profile-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:.75rem;font-weight:700;transition:all .15s;position:relative;font-family:inherit;}
.floating-header .hdr-profile-btn{background:transparent;color:var(--ink-3);}
.floating-header .hdr-profile-btn:hover{background:var(--blue-light);color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,196,.12);} /* circle on hover */
.profile-dropdown{position:absolute;top:100%;right:0;margin-top:8px;width:260px;background:white;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:300;padding:.5rem;display:none;}
.profile-dropdown.open{display:block;}
.profile-dd-header{padding:.75rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:.35rem;}
.profile-dd-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.9rem;flex-shrink:0;}
.profile-dd-name{font-weight:700;font-size:.82rem;color:var(--ink);}
.profile-dd-email{font-size:.68rem;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.profile-dd-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:.78rem;color:var(--ink-2);transition:all .12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.profile-dd-item:hover{background:var(--surface);color:var(--ink);}
.profile-dd-item i{width:16px;text-align:center;font-size:.8rem;}
.profile-dd-divider{border:none;border-top:1px solid var(--border);margin:.3rem 0;}
.page-content{padding:1.5rem;flex:1;margin-top:3rem;} /* space for floating header */

/* HERO */
.page-hero{background:linear-gradient(135deg,var(--ink) 0%,var(--ink-2) 100%);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;color:white;position:relative;overflow:hidden;}
.page-hero::after{content:'';position:absolute;right:-60px;top:-60px;width:250px;height:250px;border-radius:50%;background:rgba(26,86,196,.25);}
.page-hero::before{content:'';position:absolute;right:60px;bottom:-80px;width:180px;height:180px;border-radius:50%;background:rgba(8,145,178,.15);}
.page-hero h2{font-size:1.3rem;font-weight:700;letter-spacing:-.03em;position:relative;z-index:1;}
.page-hero p{font-size:.8rem;color:rgba(255,255,255,.6);margin-top:4px;position:relative;z-index:1;}
.page-hero .hero-stats{display:flex;gap:2rem;margin-top:1.2rem;position:relative;z-index:1;flex-wrap:wrap;}
.hero-stat-val{font-size:1.6rem;font-weight:700;letter-spacing:-.04em;}
.hero-stat-label{font-size:.68rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-tile{background:var(--white);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;border:1px solid var(--border);}
.stat-tile-top{display:flex;align-items:flex-start;justify-content:space-between;}
.stat-tile-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.stat-tile-val{font-size:1.8rem;font-weight:700;letter-spacing:-.04em;margin-top:.6rem;color:var(--ink);}
.stat-tile-label{font-size:.7rem;color:var(--ink-3);margin-top:2px;}

/* CARD */
.card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:1.25rem;}
.card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.card-title{font-size:.88rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
.card-subtitle{font-size:.7rem;color:var(--ink-3);margin-top:1px;}
.card-body{padding:1.25rem;}

/* BTNS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit;transition:all .15s;}
.btn-primary{background:var(--blue);color:white;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-secondary{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-success{background:var(--green);color:white;}
.btn-success:hover{filter:brightness(.9);}
.btn-danger{background:var(--red);color:white;}
.btn-danger:hover{filter:brightness(.9);}
.btn-amber{background:var(--amber);color:white;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink-2);}
.btn-outline:hover{background:var(--surface);}
.btn-sm{padding:5px 10px;font-size:.7rem;border-radius:6px;}
.btn-xs{padding:3px 8px;font-size:.65rem;border-radius:6px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.02em;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-amber{background:var(--amber-light);color:var(--amber);}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-gray{background:var(--surface-2);color:var(--ink-3);}
.badge-gold{background:var(--gold-light);color:var(--gold);}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:9px 10px;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);border-bottom:1px solid var(--border);background:var(--surface);}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:.8rem;color:var(--ink-2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface);}
.mark-input{width:60px;padding:5px 6px;border:1.5px solid var(--border);border-radius:6px;text-align:center;font-size:.8rem;font-family:'DM Mono',monospace;color:var(--ink);transition:border-color .2s;}
.mark-input:focus{outline:none;border-color:var(--blue);}
.mark-total{font-family:'DM Mono',monospace;font-weight:700;font-size:.85rem;color:var(--blue);}

/* FORM */
.form-control{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;font-family:inherit;color:var(--ink);background:var(--white);cursor:pointer;transition:all .2s;}
.form-control:focus{outline:none;border-color:var(--blue);}
.toolbar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem;}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:.5rem;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;transition:all .2s;}
.search-bar:focus-within{border-color:var(--blue);background:white;}
.search-bar i{color:var(--ink-4);font-size:.85rem;}
.search-bar input{border:none;background:transparent;font-family:inherit;font-size:.82rem;color:var(--ink);outline:none;min-width:160px;}

/* SORT ROW */
.sort-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;}
.sort-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:white;font-size:.68rem;font-weight:600;cursor:pointer;color:var(--ink-3);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px;}
.sort-btn.active,.sort-btn:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid);}

/* SUBJECT TREE */
.grade-select-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap;}
.grade-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:.75rem;font-weight:600;cursor:pointer;color:var(--ink-3);background:white;font-family:inherit;transition:all .15s;}
.grade-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
.tree-subject-header{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:var(--surface);cursor:pointer;font-size:.78rem;font-weight:600;color:var(--ink-2);border:1px solid var(--border);user-select:none;margin-bottom:2px;}
.tree-children{padding-left:1.2rem;border-left:2px solid var(--border);margin-left:10px;margin-top:4px;display:none;}
.tree-children.open{display:block;}
.tree-assessment{padding:5px 10px;border-radius:6px;font-size:.75rem;color:var(--ink-3);display:flex;gap:8px;align-items:center;border-left:2px solid var(--border-2);margin:2px 0;flex-wrap:wrap;}
.tree-question{padding:3px 8px;font-size:.7rem;color:var(--ink-4);display:flex;gap:6px;align-items:center;margin-left:1rem;}

/* RISK GRID */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:1024px){.risk-grid{grid-template-columns:1fr;}}
.risk-section{border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;}
.risk-section-header{padding:.85rem 1.1rem;display:flex;align-items:center;gap:8px;font-size:.8rem;font-weight:700;}
.risk-section-header.good{background:var(--green-light);color:var(--green);}
.risk-section-header.bad{background:var(--red-light);color:var(--red);}
.risk-learner-row{padding:.8rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.risk-learner-row:last-child{border-bottom:none;}

/* PROGRESS */
.prog-bar{background:var(--border);border-radius:99px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease;}

/* INTERVENTION */
.intv-card{border-radius:10px;border:1px solid var(--border);padding:.9rem;margin-bottom:.6rem;background:var(--white);}
.intv-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.5rem;}
.intv-card-body{font-size:.78rem;color:var(--ink-3);line-height:1.5;}
.intv-card-footer{margin-top:.6rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}

/* ATTENDANCE */
.att-status-btn{padding:4px 10px;border-radius:6px;border:1px solid;font-size:.67rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;}
.att-present{border-color:var(--green);color:var(--green);background:transparent;}
.att-present.active{background:var(--green);color:white;}
.att-absent{border-color:var(--red);color:var(--red);background:transparent;}
.att-absent.active{background:var(--red);color:white;}
.att-late{border-color:var(--amber);color:var(--amber);background:transparent;}
.att-late.active{background:var(--amber);color:white;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--white);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:520px;transform:translateY(20px);transition:transform .25s;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:1rem;color:var(--ink);}
.modal-field{margin-bottom:.85rem;}
.modal-field label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-bottom:5px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;font-family:inherit;color:var(--ink);background:white;transition:all .15s;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{outline:none;border-color:var(--blue);}
.modal-field textarea{resize:vertical;min-height:80px;}
.modal-footer{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1.2rem;}

/* NOTIF */
.notif-panel{position:absolute;top:100%;right:0;margin-top:8px;width:320px;background:white;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:300;padding:.75rem;display:none;}
.notif-panel.open{display:block;}
.notif-item{padding:.7rem;border-radius:8px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;}
.notif-item:hover{background:var(--surface);}
.notif-dot-icon{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:5px;}

.perf-q-val{font-size:.72rem;font-family:'DM Mono',monospace;font-weight:700;width:50px;text-align:right;color:var(--ink-2);}

.collapse-toggle.open i.chevron-drop{transform:rotate(90deg);}
.collapse-body{display:none;}
.collapse-body.open{display:block;}

/* CONSULTATION */
.consultation-thread{border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:.6rem;}

.thread-actions{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.5rem;}

/* APPROVAL */

// ─── SEED MARKS ───
(function seedMarks(){
  const learners=DB.users.filter(u=>u.role==='learner');
  learners.forEach(l=>{
    if(!DB.studentMarks[l.id])DB.studentMarks[l.id]={};
    DB.subjects.filter(s=>l.subjects.includes(s.id)).forEach(sub=>{
      DB.assessments.filter(a=>a.subjectId===sub.id).forEach(ass=>{
        if(!DB.studentMarks[l.id][ass.id])DB.studentMarks[l.id][ass.id]={};
        DB.questions.filter(q=>q.assessmentId===ass.id).forEach(q=>{
          if(DB.studentMarks[l.id][ass.id][q.id]===undefined){
            const seed=(l.id*7+ass.id*13+q.id*3)%100;
            let basePct;
            if([5,33,40,46].includes(l.id)) basePct=70+(seed%30);
            else if([22,28,31,44].includes(l.id)) basePct=20+(seed%40);
            else basePct=40+(seed%45);
            DB.studentMarks[l.id][ass.id][q.id]=Math.max(0,Math.min(q.marks,Math.round((basePct/100)*q.marks)));
          }
        });
      });
    });
  });
})();

function calcSubjectAverage(sid,subjectId){const asses=getAssessmentsBySubject(subjectId);let tw=0,w=0;asses.forEach(a=>{tw+=calcAssessmentScore(sid,a.id).pct*(a.weight/100);w+=a.weight;});return w>0?tw:0;}
function calcOverallAverage(sid){const subs=DB.subjects.filter(s=>{const u=getUser(sid);return u&&u.subjects.includes(s.id);});if(!subs.length)return 0;return subs.reduce((a,s)=>a+calcSubjectAverage(sid,s.id),0)/subs.length;}
function riskBadge(pct){if(pct>=80)return`<span class="badge badge-teal">Excellent</span>`;if(pct>=70)return`<span class="badge badge-green">On Track</span>`;if(pct>=50)return`<span class="badge badge-amber">At Risk</span>`;return`<span class="badge badge-red">High Risk</span>`;}
function progColor(pct){if(pct>=80)return'#0891b2';if(pct>=70)return'#16a34a';if(pct>=50)return'#d97706';return'#dc2626';}
function addNotif(userId,text){if(!DB.notifications[userId])DB.notifications[userId]=[];DB.notifications[userId].unshift({text,time:'Just now',read:false});if(currentUser&&currentUser.id===userId)renderNotifications();}

document.querySelectorAll('.role-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    $('schoolCodeField').style.display=tab.dataset.role==='superadmin'?'none':'';
  });
});

function showLoginError(msg){const el=$('loginError');el.textContent=msg;el.classList.add('show');}

function handleLogin(){
  $('loginError').classList.remove('show');
  const email=$('loginEmail').value.trim().toLowerCase();
  const pass=$('loginPass').value;
  const code=$('loginCode').value.trim();
  const role=document.querySelector('.role-tab.active').dataset.role;
  if(!email){showLoginError('Please enter your email address.');return;}
  if(!pass){showLoginError('Please enter your password.');return;}
  let user=null;
  if(role==='superadmin'){
    user=DB.users.find(u=>u.email===email&&u.role==='superadmin'&&u.pass===pass);
    if(!user){showLoginError('Invalid Super Admin credentials.');return;}
  } else {
    if(!code){showLoginError('School Code is required for this role.');return;}
    const school=DB.schools.find(s=>s.code===code&&s.status==='active');
    if(!school){showLoginError('Invalid or inactive School Code.');return;}
    user=DB.users.find(u=>u.email===email&&u.role===role&&u.pass===pass&&u.schoolId===school.id&&u.status==='active');
    if(!user){showLoginError('Credentials do not match. Check email, password, and role.');return;}
  }
  currentUser=user;
  if(user.role==='teacher'&&user.grades&&user.grades.length){
    teacherState.gradeFilter=user.grades[0];
    const ts=DB.subjects.filter(s=>user.subjects.includes(s.id)&&s.grade===teacherState.gradeFilter);
    if(ts.length){teacherState.subjectId=ts[0].id;const as=getAssessmentsBySubject(ts[0].id);if(as.length)teacherState.assessmentId=as[0].id;}
  }
  $('loginScreen').style.display='none';
  $('appShell').classList.add('active');
  initApp();
}

function handleLogout(){
  currentUser=null;
  $('appShell').classList.remove('active');
  $('loginScreen').style.display='';
  $('loginEmail').value='';$('loginPass').value='';$('loginCode').value='';
  $('profileDropdown').classList.remove('open');
}

function renderSAUserDirectory(){
  const q=saUserSearch.toLowerCase();
  let html='';
  DB.schools.forEach(school=>{
    const admins=DB.users.filter(u=>u.schoolId===school.id&&u.role==='schooladmin');
    let teachers=getTeachers(school.id);
    let learners=getLearners(school.id);
    const filterUser=u=>!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)||school.name.toLowerCase().includes(q);
    const fAdmins=admins.filter(filterUser);
    const fTeachers=teachers.filter(filterUser);
    let fLearners=learners.filter(filterUser);
    if(!fAdmins.length&&!fTeachers.length&&!fLearners.length)return;
    html+=`<div class="school-partition"><div class="school-partition-header"><i class="fas fa-building"></i> ${esc(school.name)} <span class="badge badge-gray" style="margin-left:auto">${fAdmins.length+fTeachers.length+fLearners.length} users</span></div><div class="school-partition-body">`;
    if(fAdmins.length){html+=`<div class="role-group-header" style="color:var(--teal)"><i class="fas fa-user-shield"></i> School Admins (${fAdmins.length})</div>`;html+=fAdmins.map(u=>saUserRow(u,'School Admin','#0891b2',false)).join('');}
    if(fTeachers.length){html+=`<div class="role-group-header" style="color:var(--purple)"><i class="fas fa-chalkboard-teacher"></i> Teachers (${fTeachers.length})</div>`;html+=fTeachers.map(u=>saUserRow(u,'Teacher','#7c3aed',false)).join('');}
    if(fLearners.length){html+=`<div class="role-group-header" style="color:var(--green)"><i class="fas fa-user-graduate"></i> Learners (${fLearners.length})</div>`;html+=fLearners.map(u=>saUserRow(u,`Learner · Grade ${u.grade}`,'#16a34a',false)).join('');}
    html+=`</div></div>`;
  });
  const saUsers=DB.users.filter(u=>u.role==='superadmin'&&(!saUserSearch||u.name.toLowerCase().includes(saUserSearch.toLowerCase())));
  if(saUsers.length){html+=`<div class="school-partition"><div class="school-partition-header"><i class="fas fa-globe"></i> Platform Level</div><div class="school-partition-body"><div class="role-group-header" style="color:var(--blue)"><i class="fas fa-globe"></i> Super Admins</div>${saUsers.map(u=>saUserRow(u,'Super Administrator','#1a56c4',false)).join('')}</div></div>`;}
  return html||'<div class="empty-state"><p>No users match your search.</p></div>';
}

function saUserRow(u,label,color,showEdit=true){
  const avg=u.role==='learner'?calcOverallAverage(u.id):null;
  return`<div class="directory-row" style="justify-content:space-between;flex-wrap:wrap;gap:6px">
    <div class="flex-gap"><div class="dir-avatar" style="background:${color}">${avatarChar(u.name)}</div>
    <div><div style="font-weight:600;font-size:.8rem">${esc(u.name)}</div><div class="text-muted">${esc(u.email)}</div></div></div>

      <span class="badge badge-gray">${label}</span>

    c.innerHTML=`<h2 style="font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem;">Dashboard</h2>

      <div><div class="hero-stat-val">${atRisk}</div><div class="hero-stat-label">At-Risk Learners</div></div>

    <div class="stats-row">

    </div><div class="card-body">
      <div style="margin-bottom:1rem">
        <div class="risk-grid">
          <div class="risk-section"><div class="risk-section-header good"><i class="fas fa-check-circle"></i> Adequate (${adequateCount})</div>
          ${avgData.filter(d=>d.avg>=50).sort((a,b)=>b.avg-a.avg).map(d=>`<div class="risk-learner-row"><div class="flex-gap"><div class="dir-avatar" style="background:var(--green);width:26px;height:26px;font-size:.65rem">${avatarChar(d.fullName)}</div><div><div style="font-weight:600;font-size:.78rem">${esc(d.fullName)}</div><div class="text-muted">Grade ${d.grade}</div></div></div><div style="text-align:right">${riskBadge(d.avg)}<div style="font-size:.72rem;font-weight:700;color:${progColor(d.avg)}">${Math.round(d.avg)}%</div></div></div>`).join('')||'<div class="empty-state" style="padding:1rem"><p>None</p></div>'}

      </div>

function renderApprovalCard(i){
  const learner=getUser(i.learnerId),teacher=getUser(i.teacherId),subject=getSubject(i.subjectId);
  const initiator=i.initiatedBy==='learner'?learner?.name:teacher?.name;
  return`<div class="approval-card">
    <div class="approval-card-header"><div><div style="font-weight:700;font-size:.85rem">${esc(learner?.name||'—')}</div><div class="text-muted">${i.initiatedBy==='learner'?'Requested by learner':'Referred by '+esc(teacher?.name||'—')} · ${esc(subject?.name||'—')} · Grade ${learner?.grade||'?'}</div></div><span class="badge badge-amber">Pending</span></div>
    <div style="font-size:.78rem;color:var(--ink-2);margin:.5rem 0">${esc(i.message)}</div>
    ${i.recommendation?`<div style="font-size:.78rem;margin-bottom:.6rem"><strong>Recommendation:</strong> ${esc(i.recommendation)}</div>`:''}
    <div class="modal-field" style="margin-bottom:.5rem"><label>Supporting Comment</label><input type="text" id="approveComment${i.id}" placeholder="Optional comment..."></div>
    <div class="flex-gap">
      <button class="btn btn-success btn-sm" onclick="approveIntervention(${i.id}, document.getElementById('approveComment${i.id}').value)"><i class="fas fa-check"></i> Approve → Learner</button>
      <button class="btn btn-danger btn-sm" onclick="rejectIntervention(${i.id})"><i class="fas fa-times"></i> Reject</button>
    </div>
  </div>`;
}

function renderAdminTeacherList(tch){
  const q=adminUserSearch.toLowerCase();
  let filtered=tch.filter(u=>!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));
  if(!filtered.length)return'<div class="empty-state"><p>No teachers match.</p></div>';
  return filtered.map(u=>adminTeacherRow(u)).join('');
}

function renderAdminLearnerList(lrn){
  const q=adminUserSearch.toLowerCase();
  let filtered=lrn.filter(u=>!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));
  if(adminGradeFilter)filtered=filtered.filter(l=>l.grade===adminGradeFilter);
  if(adminUserSort==='avg')filtered=filtered.sort((a,b)=>calcOverallAverage(b.id)-calcOverallAverage(a.id));
  else if(adminUserSort==='grade')filtered=filtered.sort((a,b)=>a.grade-b.grade||a.name.localeCompare(b.name));
  else filtered=filtered.sort((a,b)=>a.name.localeCompare(b.name));
  if(!filtered.length)return'<div class="empty-state"><p>No learners in this selection.</p></div>';
  return filtered.map(u=>adminLearnerRow(u)).join('');
}

function adminTeacherRow(u){
  const subs=DB.subjects.filter(s=>u.subjects.includes(s.id));
  return`<div class="directory-row" style="justify-content:space-between;flex-wrap:wrap;gap:6px"><div class="flex-gap" style="flex:1;min-width:200px"><div class="dir-avatar" style="background:${avatarColor(u.role)}">${avatarChar(u.name)}</div><div style="flex:1"><div style="font-weight:600;font-size:.8rem">${esc(u.name)}</div><div class="text-muted">${esc(u.email)}</div><div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:3px">${(u.grades||[]).map(g=>`<span class="teacher-info-chip"><i class="fas fa-layer-group"></i> Grade ${g}</span>`).join('')}${subs.slice(0,3).map(s=>`<span class="teacher-info-chip"><i class="fas fa-book"></i> ${esc(s.name)}</span>`).join('')}${subs.length>3?`<span class="teacher-info-chip">+${subs.length-3} more</span>`:''}</div></div></div>
  <div class="flex-gap flex-wrap"><span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status}</span><button class="btn btn-secondary btn-xs" onclick="openAdminEditUserModal(${u.id})"><i class="fas fa-edit"></i> Edit</button><button class="btn btn-xs ${u.status==='active'?'btn-danger':'btn-success'}" onclick="toggleUserStatus(${u.id})">${u.status==='active'?'Deactivate':'Activate'}</button></div></div>`;
}

function adminLearnerRow(u){
  const avg=calcOverallAverage(u.id);
  return`<div class="directory-row" style="justify-content:space-between;flex-wrap:wrap;gap:6px"><div class="flex-gap"><div class="dir-avatar" style="background:${avatarColor(u.role)}">${avatarChar(u.name)}</div><div><div style="font-weight:600;font-size:.8rem">${esc(u.name)}</div><div class="text-muted">${esc(u.email)} · Grade ${u.grade}</div></div></div>
  <div class="flex-gap flex-wrap">${riskBadge(avg)}<span style="font-weight:700;font-size:.8rem;color:${progColor(avg)}">${Math.round(avg)}%</span><span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status}</span><button class="btn btn-secondary btn-xs" onclick="openAdminEditUserModal(${u.id})"><i class="fas fa-edit"></i> Edit</button><button class="btn btn-blue btn-xs" style="background:var(--teal);color:white" onclick="openManageLearnerSubjects(${u.id})"><i class="fas fa-book"></i> Subjects</button><button class="btn btn-xs ${u.status==='active'?'btn-danger':'btn-success'}" onclick="toggleUserStatus(${u.id})">${u.status==='active'?'Deactivate':'Activate'}</button></div></div>`;
}

// Modify admin edit user modal to include subject editing for teachers
function openAdminEditUserModal(userId){
  const u=getUser(userId);if(!u)return;
  let extraHtml='';
  if(u.role==='teacher'){
    const schoolSubs=DB.subjects.filter(s=>s.schoolId===currentUser.schoolId);
    extraHtml=`<div class="modal-field"><label>Subjects Taught</label><div style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:.5rem">${schoolSubs.map(s=>`<label style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.8rem"><input type="checkbox" value="${s.id}" class="teacherSubjCheck" ${u.subjects.includes(s.id)?'checked':''}> ${esc(s.name)} (Gr ${s.grade})</label>`).join('')||'No subjects available.'}</div></div>`;
  }
  openModal(`<div class="modal-title"><i class="fas fa-user-edit"></i> Edit — ${esc(u.name)}</div>
    <div class="modal-field"><label>Full Name</label><input type="text" id="m_eu_name" value="${esc(u.name)}"></div>
    <div class="modal-field"><label>Email</label><input type="email" id="m_eu_email" value="${esc(u.email)}"></div>
    ${u.role==='learner'?`<div class="modal-field"><label>Grade</label><select id="m_eu_grade"><option value="10" ${u.grade===10?'selected':''}>Grade 10</option><option value="11" ${u.grade===11?'selected':''}>Grade 11</option><option value="12" ${u.grade===12?'selected':''}>Grade 12</option></select></div>`:''}
    ${u.role==='teacher'?`<div class="modal-field"><label>Grades Taught</label><div style="display:flex;gap:.5rem;flex-wrap:wrap">${[10,11,12].map(g=>`<label style="display:flex;align-items:center;gap:4px;font-size:.8rem"><input type="checkbox" value="${g}" ${(u.grades||[]).includes(g)?'checked':''} class="teacherGradeCheck"> Grade ${g}</label>`).join('')}</div></div>`:''}
    ${extraHtml}
    <div class="modal-footer"><button class="btn btn-amber btn-sm" onclick="resetUserPassword(${userId})" style="margin-right:auto"><i class="fas fa-key"></i> Reset PW</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveAdminUserEdit(${userId})">Save</button></div>`);
}

function saveAdminUserEdit(userId){
  const u=getUser(userId);if(!u)return;
  u.name=$('m_eu_name').value.trim();u.email=$('m_eu_email').value.trim();
  if(u.role==='learner'&&$('m_eu_grade'))u.grade=parseInt($('m_eu_grade').value);
  if(u.role==='teacher'){
    const checks=document.querySelectorAll('.teacherGradeCheck');
    u.grades=[];checks.forEach(c=>{if(c.checked)u.grades.push(parseInt(c.value));});
    const subjChecks=document.querySelectorAll('.teacherSubjCheck');
    u.subjects=[];subjChecks.forEach(c=>{if(c.checked)u.subjects.push(parseInt(c.value));});
  }
  closeModal();navigateTo(activeTab);
}

function openManageLearnerSubjects(learnerId){
  const u=getUser(learnerId);if(!u)return;
  const schoolSubs=DB.subjects.filter(s=>s.schoolId===currentUser.schoolId&&s.grade===u.grade);
  openModal(`<div class="modal-title"><i class="fas fa-book"></i> Manage Subjects — ${esc(u.name)} (Grade ${u.grade})</div>
    <p class="text-muted" style="margin-bottom:.75rem;font-size:.75rem">Select subjects for this learner. Only Grade ${u.grade} subjects shown.</p>
    ${schoolSubs.length?schoolSubs.map(s=>`<label style="display:flex;align-items:center;gap:8px;padding:.5rem .25rem;border-bottom:1px solid var(--border);font-size:.82rem;cursor:pointer"><input type="checkbox" value="${s.id}" ${u.subjects.includes(s.id)?'checked':''} class="learnerSubCheck"> ${esc(s.name)}</label>`).join(''):'<div class="empty-state"><p>No subjects configured for Grade '+u.grade+'.</p></div>'}
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLearnerSubjects(${learnerId})">Save Subjects</button></div>`);
}

function saveLearnerSubjects(learnerId){
  const u=getUser(learnerId);if(!u)return;
  const checks=document.querySelectorAll('.learnerSubCheck');
  u.subjects=[];checks.forEach(c=>{if(c.checked)u.subjects.push(parseInt(c.value));});
  closeModal();navigateTo('users');
}

function resetUserPassword(userId){const u=getUser(userId);if(u){u.pass='123';alert(`Password for ${u.name} reset to '123'.`);}}
function toggleUserStatus(id){const u=DB.users.find(u=>u.id===id);if(u)u.status=u.status==='active'?'inactive':'active';navigateTo(activeTab);}

function approveIntervention(id, comment){
  const intv=DB.interventions.find(i=>i.id===id);
  if(intv){
    intv.status='pending_learner';
    intv.adminComment=comment||'';
    addNotif(intv.learnerId,`Your school has approved a resource for you: "${intv.recommendation||'Resource'}". Please accept or decline in My Resources.`);
  }
  renderSidebarNav();navigateTo('approvals');
}
function rejectIntervention(id){DB.interventions=DB.interventions.filter(i=>i.id!==id);renderSidebarNav();navigateTo('approvals');}
function toggleResource(id){const r=DB.resources.find(r=>r.id===id);if(r)r.active=!r.active;navigateTo('resources');}

function openAddResourceModal(){openModal(`<div class="modal-title">Add Resource</div><div class="modal-field"><label>Title</label><input type="text" id="m_resTitle" placeholder="Resource name"></div><div class="modal-field"><label>Description</label><textarea id="m_resDesc" placeholder="Brief description..."></textarea></div><div class="modal-field"><label>Type</label><select id="m_resType"><option value="school-based">School-based</option><option value="digital">Digital</option><option value="external">External</option></select></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addResource()">Add</button></div>`);}
function addResource(){const title=$('m_resTitle').value.trim();if(!title){alert('Title required.');return;}DB.resources.push({id:newId(),title,description:$('m_resDesc').value.trim(),type:$('m_resType').value,active:true});closeModal();navigateTo('resources');}

function openAddUserModal(role){
  const schoolSubs=DB.subjects.filter(s=>s.schoolId===currentUser.schoolId);
  openModal(`<div class="modal-title">Add ${role==='teacher'?'Teacher':'Learner'}</div>
    <div class="modal-field"><label>Full Name</label><input type="text" id="m_userName"></div>
    <div class="modal-field"><label>Email</label><input type="email" id="m_userEmail"></div>
    ${role==='learner'?`<div class="modal-field"><label>Grade</label><select id="m_userGrade" onchange="updateNewLearnerSubjects()"><option value="10">Grade 10</option><option value="11">Grade 11</option><option value="12">Grade 12</option></select></div><div class="modal-field" id="newLearnerSubsField"><label>Subjects</label><div id="newLearnerSubsList"></div></div>`:''}
    ${role==='teacher'?`<div class="modal-field"><label>Grades Taught</label><div style="display:flex;gap:.5rem">${[10,11,12].map(g=>`<label style="display:flex;align-items:center;gap:4px;font-size:.8rem"><input type="checkbox" value="${g}" class="newTeacherGradeChk"> Grade ${g}</label>`).join('')}</div></div>`:''}
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addUser('${role}')">Add</button></div>`);
  if(role==='learner')setTimeout(updateNewLearnerSubjects,50);
}

function updateNewLearnerSubjects(){
  const gradeEl=$('m_userGrade');if(!gradeEl)return;
  const grade=parseInt(gradeEl.value);
  const subs=DB.subjects.filter(s=>s.schoolId===currentUser.schoolId&&s.grade===grade);
  const list=$('newLearnerSubsList');
  if(list)list.innerHTML=subs.map(s=>`<label style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.8rem"><input type="checkbox" value="${s.id}" class="newLearnerSubChk" checked> ${esc(s.name)}</label>`).join('')||'<span class="text-muted">No subjects for this grade yet.</span>';

function addUser(role){
  const name=$('m_userName').value.trim(),email=$('m_userEmail').value.trim();
  if(!name||!email){alert('Name and email required.');return;}
  let grade=null,subjects=[],grades=[];
  if(role==='learner'){grade=parseInt($('m_userGrade').value);document.querySelectorAll('.newLearnerSubChk').forEach(c=>{if(c.checked)subjects.push(parseInt(c.value));});}
  if(role==='teacher'){document.querySelectorAll('.newTeacherGradeChk').forEach(c=>{if(c.checked)grades.push(parseInt(c.value));});}
  DB.users.push({id:newId(),name,email,pass:'123',role,status:'active',schoolId:currentUser.schoolId,grade,subjects,grades});
  closeModal();navigateTo('users');
}

// SUBJECT MANAGEMENT
function renderSubjectTree(schoolId,grade){
  const subs=DB.subjects.filter(s=>s.schoolId===schoolId&&s.grade===grade);
  if(!subs.length)return`<div class="empty-state"><i class="fas fa-sitemap"></i><p>No subjects for Grade ${grade}. Click "Add Subject".</p></div>`;
  return subs.map(sub=>{
    const asses=getAssessmentsBySubject(sub.id);
    const terms=[...new Set(asses.map(a=>a.term))].sort();
    const uid=`sub_${sub.id}`;
    return`<div style="margin-bottom:.75rem">
      <div class="tree-subject-header" onclick="var el=document.getElementById('${uid}');el.classList.toggle('open');this.querySelector('.chev').style.transform=el.classList.contains('open')?'rotate(90deg)':'rotate(0deg)'">
        <i class="fas fa-book" style="color:var(--blue)"></i> ${esc(sub.name)}
        <span class="badge badge-blue" style="margin-left:auto">${asses.length} assessments</span>
        <i class="fas fa-chevron-right chev" style="margin-left:6px;transition:transform .2s;font-size:.7rem"></i>
      </div>
      <div class="tree-children" id="${uid}" style="border-left-color:var(--blue-mid)">
        ${terms.map(term=>{
          const tAss=asses.filter(a=>a.term===term);
          return`<div style="margin-bottom:.4rem"><div style="font-size:.7rem;font-weight:700;color:var(--ink-3);text-transform:uppercase;padding:3px 0">Term ${term}</div>
          ${tAss.map(ass=>{
            const qs=getQuestionsByAssessment(ass.id);
            return`<div class="tree-assessment">
              <div class="flex-gap"><i class="fas fa-file-alt"></i><strong>${esc(ass.name)}</strong> — ${ass.totalMarks} marks · ${ass.type} · ${ass.weight}%</div>
              <div class="flex-gap"><button class="btn btn-xs btn-outline" onclick="event.stopPropagation();openAddQuestionModal(${ass.id})"><i class="fas fa-plus"></i> Q</button><button class="btn btn-xs btn-outline" onclick="event.stopPropagation();openEditAssessmentModal(${ass.id})"><i class="fas fa-edit"></i></button><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteAssessment(${ass.id})"><i class="fas fa-trash"></i></button></div>
              ${qs.length?`<div style="padding-left:1rem;border-left:2px solid var(--border);margin-top:4px;width:100%">${qs.map(q=>`<div class="tree-question"><i class="fas fa-question-circle" style="color:var(--ink-4)"></i> ${esc(q.name)} — ${q.marks} marks — <span class="badge badge-gray">${esc(q.topic)}</span></div>`).join('')}</div>`:''}
            </div>`;
          }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function onMarkSubjectChange(){
  teacherState.subjectId=parseInt($('markSubjectSel').value);
  const as=getAssessmentsBySubject(teacherState.subjectId);
  if(as.length)teacherState.assessmentId=as[0].id;
  const sel=$('markAssessSel');
  if(sel)sel.innerHTML=as.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('');
  buildMarkTable();
}
function onMarkAssessChange(){teacherState.assessmentId=parseInt($('markAssessSel').value);buildMarkTable();}

function buildMarkTable(){
  const tbl=$('markTable');if(!tbl)return;
  const qs=getQuestionsByAssessment(teacherState.assessmentId);
  const learners=getLearners(currentUser.schoolId,teacherState.gradeFilter).filter(l=>l.subjects.includes(teacherState.subjectId));
  if(!qs.length){tbl.innerHTML='<tr><td class="text-muted">No questions configured.</td></tr>';return;}
  tbl.innerHTML=`<thead><tr><th>Learner</th><th>Grade</th>${qs.map(q=>`<th>${esc(q.name)}<br><span style="font-weight:400;color:var(--ink-4)">${esc(q.topic)} (/${q.marks})</span></th>`).join('')}<th>Total</th><th>%</th></tr></thead>
  <tbody>${learners.map(s=>{
    let tot=0,pos=0;
    const cells=qs.map(q=>{const m=getMark(s.id,teacherState.assessmentId,q.id);tot+=m;pos+=q.marks;return`<td><input type="number" class="mark-input" id="mk_${s.id}_${teacherState.assessmentId}_${q.id}" value="${m}" min="0" max="${q.marks}" oninput="onMarkInput(${s.id},${teacherState.assessmentId},${q.id},this)"></td>`;}).join('');
    const pct=pos>0?(tot/pos*100):0;
    return`<tr><td><div style="font-weight:600">${esc(s.name)}</div></td><td><span class="badge badge-gray">Gr ${s.grade}</span></td>${cells}<td><span class="mark-total" id="mktot_${s.id}_${teacherState.assessmentId}">${tot}</span></td><td><span style="font-size:.8rem;font-weight:700;color:${progColor(pct)}" id="mkpct_${s.id}_${teacherState.assessmentId}">${Math.round(pct)}%</span></td></tr>`;
  }).join('')}</tbody>`;
}

function onMarkInput(studentId,assId,qId,input){
  const q=DB.questions.find(x=>x.id===qId);
  let val=parseInt(input.value)||0;
  if(val<0)val=0;if(q&&val>q.marks){val=q.marks;input.value=val;}
  setMark(studentId,assId,qId,val);
  const qs=getQuestionsByAssessment(assId);
  let tot=0,pos=0;qs.forEach(q=>{tot+=getMark(studentId,assId,q.id);pos+=q.marks;});
  const te=$(`mktot_${studentId}_${assId}`),pe=$(`mkpct_${studentId}_${assId}`);
  if(te)te.textContent=tot;
  if(pe){const pct=pos>0?(tot/pos*100):0;pe.textContent=Math.round(pct)+'%';pe.style.color=progColor(pct);}
  const rg=$('riskGrid');if(rg)buildRiskGrid();
}

function saveMarks(){
  const qs=getQuestionsByAssessment(teacherState.assessmentId);
  getLearners(currentUser.schoolId,teacherState.gradeFilter).forEach(s=>{
    qs.forEach(q=>{const inp=$(`mk_${s.id}_${teacherState.assessmentId}_${q.id}`);if(inp)setMark(s.id,teacherState.assessmentId,q.id,parseInt(inp.value)||0);});
  });
  const msg=$('markSaveMsg');if(msg){msg.style.display='';setTimeout(()=>{if(msg)msg.style.display='none';},3000);}
}
function saveMarksAndRefresh(){saveMarks();const rg=$('riskGrid');if(rg)buildRiskGrid();}

function buildRiskGrid(){
  const grid=$('riskGrid');if(!grid)return;
  let learners=getLearners(currentUser.schoolId,teacherState.gradeFilter).filter(l=>currentUser.subjects.some(sid=>l.subjects.includes(sid)));
  const subFilter=teacherState.subjectFilter;
  const calcAvg=l=>subFilter?calcSubjectAverage(l.id,subFilter):calcOverallAverage(l.id);
  const good=[],risk=[];
  learners.forEach(l=>{const avg=calcAvg(l);(avg>=50?good:risk).push({learner:l,avg});});
  good.sort((a,b)=>b.avg-a.avg);risk.sort((a,b)=>a.avg-b.avg);
  const subLabel=subFilter?` (${esc(getSubject(subFilter)?.name||'')})`:' (Overall)';
  grid.innerHTML=`
    <div class="risk-section"><div class="risk-section-header good"><i class="fas fa-check-circle"></i> Adequate${subLabel} (${good.length})</div>
    ${good.length?good.map(({learner:l,avg})=>`<div class="risk-learner-row"><div class="flex-gap"><div class="dir-avatar" style="background:var(--green);width:28px;height:28px;font-size:.7rem">${avatarChar(l.name)}</div><div><div style="font-weight:600;font-size:.8rem">${esc(l.name)}${avg>=80?' <span class="top-performer-star"><i class="fas fa-star"></i></span>':''}</div><div class="text-muted">Grade ${l.grade}</div></div></div><div style="text-align:right">${riskBadge(avg)}<div style="font-size:.75rem;font-weight:700;color:${progColor(avg)};margin-top:2px">${Math.round(avg)}%</div></div></div>`).join(''):'<div class="empty-state" style="padding:1.5rem"><p>No learners in adequate standing</p></div>'}
    </div>
    <div class="risk-section"><div class="risk-section-header bad"><i class="fas fa-exclamation-triangle"></i> Requires Action${subLabel} (${risk.length})</div>
    ${risk.length?risk.map(({learner:l,avg})=>`<div class="risk-learner-row" style="flex-direction:column;align-items:flex-start"><div class="flex-between" style="width:100%;flex-wrap:wrap;gap:6px"><div class="flex-gap"><div class="dir-avatar" style="background:${progColor(avg)};width:28px;height:28px;font-size:.7rem">${avatarChar(l.name)}</div><div><div style="font-weight:600;font-size:.8rem">${esc(l.name)}</div><div class="text-muted">Grade ${l.grade} · ${Math.round(avg)}%</div></div></div>${riskBadge(avg)}</div><div class="prog-bar" style="width:100%;margin:6px 0"><div class="prog-fill" style="width:${avg}%;background:${progColor(avg)}"></div></div><button class="btn btn-primary btn-sm" onclick="openInterventionModal(${l.id})"><i class="fas fa-hand-holding-heart"></i> Initiate Intervention</button></div>`).join(''):'<div class="empty-state" style="padding:1.5rem"><p>No at-risk learners</p></div>'}
    </div>`;
}

function buildMyInterventions(){
  const list=$('myIntervList');if(!list)return;
  const mine=DB.interventions.filter(i=>i.teacherId===currentUser.id);
  if(!mine.length){list.innerHTML='<div class="empty-state"><p>No interventions submitted yet.</p></div>';return;}
  const statusMap={pending_admin:'<span class="badge badge-amber">Pending Admin Approval</span>',pending_learner:'<span class="badge badge-blue">Pending Learner Acceptance</span>',active:'<span class="badge badge-green">Active</span>',rejected:'<span class="badge badge-red">Rejected</span>'};
  list.innerHTML=mine.map(i=>{const learner=getUser(i.learnerId);return`<div class="intv-card"><div class="intv-card-header"><div style="font-weight:700;font-size:.82rem">${esc(learner?.name||'—')} — ${esc(i.topic)}</div>${statusMap[i.status]||''}</div><div class="intv-card-body">${esc(i.message)}<br><strong>Recommendation:</strong> ${esc(i.recommendation)}</div><div class="intv-card-footer"><span class="text-muted">Submitted ${formatDate(i.createdAt)}</span></div></div>`;}).join('');
}

function openInterventionModal(learnerId){
  const learner=getUser(learnerId);
  const tsubs=getTeacherSubjectsForGrade(teacherState.gradeFilter);
  openModal(`<div class="modal-title">Initiate Intervention — ${esc(learner.name)}</div>
    <p class="text-muted" style="margin-bottom:1rem;font-size:.78rem">Choose how you'd like to support this learner.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem">
      <div id="optA" onclick="selectIntervOption('A')" style="border:2px solid var(--blue);border-radius:10px;padding:.9rem;cursor:pointer;background:var(--blue-light)">
        <div style="font-weight:700;font-size:.82rem;color:var(--blue);margin-bottom:4px"><i class="fas fa-hands-helping"></i> Recommend Resource</div>
        <div class="text-muted" style="font-size:.72rem">Submit to Admin → Admin approves → Learner accepts.</div>
      </div>
      <div id="optB" onclick="selectIntervOption('B')" style="border:2px solid var(--border);border-radius:10px;padding:.9rem;cursor:pointer">
        <div style="font-weight:700;font-size:.82rem;color:var(--ink-2);margin-bottom:4px"><i class="fas fa-comments"></i> Schedule Consultation</div>
        <div class="text-muted" style="font-size:.72rem">Direct support — alerts learner immediately, no admin needed.</div>
      </div>
    </div>
    <div id="intervFormA">
      <div class="modal-field"><label>Subject</label><select id="m_intv_subject">${tsubs.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>
      <div class="modal-field"><label>Resource to Recommend</label><select id="m_intv_resource">${DB.resources.filter(r=>r.active).map(r=>`<option value="${esc(r.title)}">${esc(r.title)}</option>`).join('')}</select></div>
      <div class="modal-field"><label>Topic of Concern</label><input type="text" id="m_intv_topic" placeholder="e.g. Algebra, Functions"></div>
      <div class="modal-field"><label>Notes for Admin</label><textarea id="m_intv_msg" placeholder="Describe why this learner needs support..."></textarea></div>
    </div>
    <div id="intervFormB" style="display:none">
      <div class="modal-field"><label>Session Topic</label><input type="text" id="m_consult_topic" placeholder="e.g. Grade ${teacherState.gradeFilter} Maths Review"></div>
      <div class="modal-field"><label>Message to Learner</label><textarea id="m_consult_msg" placeholder="Let the learner know what to expect..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="intervSubmitBtn" onclick="submitIntervention(${learnerId})">Submit Resource Recommendation</button></div>`);
}

function selectIntervOption(opt){
  selectedIntervOption=opt;
  $('optA').style.borderColor=opt==='A'?'var(--blue)':'var(--border)';
  $('optA').style.background=opt==='A'?'var(--blue-light)':'';
  $('optB').style.borderColor=opt==='B'?'var(--blue)':'var(--border)';
  $('optB').style.background=opt==='B'?'var(--blue-light)':'';
  $('intervFormA').style.display=opt==='A'?'block':'none';
  $('intervFormB').style.display=opt==='B'?'block':'none';
  $('intervSubmitBtn').textContent=opt==='A'?'Submit Resource Recommendation':'Schedule Consultation';
}

function submitIntervention(learnerId){
  if(selectedIntervOption==='A'){
    const subjectId=parseInt($('m_intv_subject').value);
    const rec=$('m_intv_resource').value;
    const topic=$('m_intv_topic').value.trim();
    const msg=$('m_intv_msg').value.trim();
    if(!topic||!msg){alert('Please fill in all fields.');return;}
    DB.interventions.push({id:newId(),teacherId:currentUser.id,learnerId,subjectId,topic,message:msg,recommendation:rec,status:'pending_admin',createdAt:new Date().toISOString().split('T')[0],type:'resource',initiatedBy:'teacher'});
    addNotif(learnerId,`Your teacher ${currentUser.name} has submitted an intervention request for you.`);
  } else {
    const topic=$('m_consult_topic').value.trim();
    const msg=$('m_consult_msg').value.trim();
    if(!topic||!msg){alert('Please fill in all fields.');return;}
    DB.consultations.push({id:newId(),teacherId:currentUser.id,learnerId,topic,message:msg,status:'active',createdAt:new Date().toISOString().split('T')[0]});
    addNotif(learnerId,`${currentUser.name} has scheduled a consultation with you: ${topic}`);
  }
  closeModal();renderSidebarNav();navigateTo('risk');
}

function buildAttendanceTable(today){
  const subjEl=$('attSubjSel');
  const subjectId=subjEl?parseInt(subjEl.value):(getTeacherSubjectsForGrade(teacherState.gradeFilter)[0]?.id||1);
  if(!DB.attendance[today])DB.attendance[today]={};
  if(!DB.attendance[today][subjectId])DB.attendance[today][subjectId]={};
  const recs=DB.attendance[today][subjectId];
  const learners=getLearners(currentUser.schoolId,teacherState.gradeFilter).filter(l=>l.subjects.includes(subjectId));
  const tbody=$('attBody');if(!tbody)return;
  tbody.innerHTML=learners.map(l=>{const st=recs[l.id]||'present';return`<tr><td><div style="font-weight:600">${esc(l.name)}</div></td><td><span class="badge badge-gray">Gr ${l.grade}</span></td><td><button class="att-status-btn att-present ${st==='present'?'active':''}" onclick="setAttendance(${l.id},'present',${subjectId},'${today}')">Present</button></td><td><button class="att-status-btn att-absent ${st==='absent'?'active':''}" onclick="setAttendance(${l.id},'absent',${subjectId},'${today}')">Absent</button></td><td><button class="att-status-btn att-late ${st==='late'?'active':''}" onclick="setAttendance(${l.id},'late',${subjectId},'${today}')">Late</button></td><td><span class="badge ${st==='present'?'badge-green':st==='absent'?'badge-red':'badge-amber'}">${st}</span></td></tr>`;}).join('');
}
function setAttendance(sid,status,subjectId,date){if(!DB.attendance[date])DB.attendance[date]={};if(!DB.attendance[date][subjectId])DB.attendance[date][subjectId]={};DB.attendance[date][subjectId][sid]=status;buildAttendanceTable(date);}
function saveAttendance(){const msg=$('attSaveMsg');if(msg){msg.style.display='';setTimeout(()=>{if(msg)msg.style.display='none';},3000);}}

// ═══════════════════════════════════════════
// LEARNER
// ═══════════════════════════════════════════
function renderLearner(c){
  const uid=currentUser.id;
  const mySubjects=DB.subjects.filter(s=>currentUser.subjects.includes(s.id));
  const overall=calcOverallAverage(uid);

  if(activeTab==='dashboard'){
    const approved=DB.interventions.filter(i=>i.learnerId===uid&&i.status==='active');
    const pending=DB.interventions.filter(i=>i.learnerId===uid&&i.status==='pending_learner');
    const myConsults=DB.consultations.filter(co=>co.learnerId===uid);
    const badgeHtml=overall>=80?'<span class="badge badge-gold"><i class="fas fa-star"></i> Top Performer</span>':'';
    c.innerHTML=`<h2 style="font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem;">Dashboard</h2>
    <div class="page-hero"><h2>Welcome, ${esc(currentUser.name)} ${badgeHtml}</h2><p>Grade ${currentUser.grade} · ${esc(getSchool(currentUser.schoolId)?.name||'')}</p>
      <div class="hero-stats"><div><div class="hero-stat-val">${Math.round(overall)}%</div><div class="hero-stat-label">Overall Average</div></div><div><div class="hero-stat-val">${approved.length}</div><div class="hero-stat-label">Active Resources</div></div><div><div class="hero-stat-val">${pending.length}</div><div class="hero-stat-label">Awaiting Your Response</div></div><div><div class="hero-stat-val">${myConsults.length}</div><div class="hero-stat-label">Consultations</div></div></div>
    </div>
    <div class="stats-row">${mySubjects.map(s=>{const avg=calcSubjectAverage(uid,s.id);return`<div class="stat-tile"><div class="stat-tile-top"><div><div class="stat-tile-val">${Math.round(avg)}%</div><div class="stat-tile-label">${esc(s.name)}</div></div>${riskBadge(avg)}</div><div style="margin-top:8px"><div class="prog-bar"><div class="prog-fill" style="width:${avg}%;background:${progColor(avg)}"></div></div></div></div>`;}).join('')}</div>
    ${pending.length?`<div class="card" style="border-color:var(--green)"><div class="card-header" style="background:var(--green-light)"><div class="card-title" style="color:var(--green)"><i class="fas fa-bell"></i> ${pending.length} Resource(s) Awaiting Your Acceptance</div><button class="btn btn-primary btn-sm" onclick="navigateTo('resources')">View &amp; Respond</button></div></div>`:''}
    <div class="about-card">
      <strong>About ARIS</strong>
      ARIS keeps you informed about your academic progress, connects you with school resources, and lets you request extra support when needed.
    </div>`;

  } else if(activeTab==='performance'){
    let html='';
    mySubjects.forEach(sub=>{
      const asses=getAssessmentsBySubject(sub.id);if(!asses.length)return;
      const subAvg=calcSubjectAverage(uid,sub.id);
      html+=`<div class="card"><div class="card-header"><div><div class="card-title">${esc(sub.name)}</div><div class="card-subtitle">Grade ${sub.grade}</div></div><div style="text-align:right"><span style="font-size:1.2rem;font-weight:700;color:${progColor(subAvg)}">${Math.round(subAvg)}%</span><br>${riskBadge(subAvg)}</div></div>
      <div class="card-body">${asses.map(ass=>{
        const{earned,possible,pct}=calcAssessmentScore(uid,ass.id);
        const qs=getQuestionsByAssessment(ass.id);
        const colId=`col_${sub.id}_${ass.id}`;
        return`<div class="perf-strip">
          <div class="collapse-toggle ${pct<70?'open':''}" onclick="this.classList.toggle('open');document.getElementById('${colId}').classList.toggle('open')" style="margin-bottom:4px">
            <div class="perf-strip-header" style="flex:1;margin:0">
              <div style="font-weight:700;font-size:.82rem">${esc(ass.name)} <span class="badge badge-gray">${ass.type}</span></div>
              <div style="font-weight:700;color:${progColor(pct)};font-size:.85rem">${earned}/${possible} — ${Math.round(pct)}%</div>
            </div>
            <i class="fas fa-chevron-right chevron-drop" style="margin-left:8px;font-size:.7rem;color:var(--ink-3)"></i>
          </div>
          <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" style="width:${pct}%;background:${progColor(pct)}"></div></div>
          <div class="collapse-body ${pct<70?'open':''}" id="${colId}">
            ${qs.map(q=>{const m=getMark(uid,ass.id,q.id);const qpct=q.marks>0?(m/q.marks)*100:0;return`<div class="perf-q-row"><div class="perf-q-name">${esc(q.name)} <span class="badge badge-gray" style="font-size:.55rem">${esc(q.topic)}</span></div><div class="perf-q-bar"><div class="prog-bar"><div class="prog-fill" style="width:${qpct}%;background:${progColor(qpct)}"></div></div></div><div class="perf-q-val" style="color:${progColor(qpct)}">${m}/${q.marks}</div><span>${qpct>=80?'✅':qpct>=50?'⚠️':'❌'}</span></div>`;}).join('')}
          </div>
        </div>`;
      }).join('')}
      </div></div>`;
    });
    c.innerHTML=`<h2 style="font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem;">My Performance</h2>${html||'<div class="empty-state"><i class="fas fa-chart-bar"></i><p>No performance data yet.</p></div>'}`;

  } else if(activeTab==='resources'){
    const pendingR=DB.interventions.filter(i=>i.learnerId===uid&&i.status==='pending_learner');
    const activeR=DB.interventions.filter(i=>i.learnerId===uid&&i.status==='active');
    c.innerHTML=`<h2 style="font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem;">My Resources</h2>
      ${pendingR.length?`<div class="card" style="border-color:var(--green)"><div class="card-header" style="background:var(--green-light)"><div class="card-title" style="color:var(--green)"><i class="fas fa-hand-holding-heart"></i> Resources Awaiting Your Acceptance (${pendingR.length})</div></div>
      <div class="card-body">${pendingR.map(i=>{const teacher=getUser(i.teacherId);const subj=getSubject(i.subjectId);return`<div class="accept-card">
        <div class="accept-card-header"><div><div style="font-weight:700;font-size:.85rem">${esc(i.recommendation)}</div><div class="text-muted">From ${esc(teacher?.name||'—')} · ${esc(subj?.name||'—')} · Topic: ${esc(i.topic)}</div></div><span class="badge badge-blue">Awaiting You</span></div>
        <div style="font-size:.78rem;color:var(--ink-2);margin:.5rem 0">${esc(i.message)}</div>
        <div class="flex-gap"><button class="btn btn-success btn-sm" onclick="learnerAcceptResource(${i.id})"><i class="fas fa-check"></i> Accept Resource</button><button class="btn btn-danger btn-sm" onclick="learnerDeclineResource(${i.id})"><i class="fas fa-times"></i> Decline</button></div>
      </div>`;}).join('')}</div></div>`:''}
      <div class="card"><div class="card-header"><div class="card-title">Active Resources</div>
        <button class="btn btn-primary btn-sm" onclick="openLearnerResourceRequest()"><i class="fas fa-paper-plane"></i> Request Resource</button>
      </div>
      <div class="card-body">${activeR.length?activeR.map(i=>{const teacher=getUser(i.teacherId);return`<div class="intv-card"><div class="intv-card-header"><div style="font-weight:700;font-size:.83rem">${esc(i.recommendation)}</div><span class="badge badge-green">Active</span></div><div class="intv-card-body">Recommended by ${esc(teacher?.name||'—')} · Topic: ${esc(i.topic)}</div><div class="intv-card-footer"><span class="text-muted">${formatDate(i.createdAt)}</span></div></div>`;}).join(''):'<div class="empty-state"><i class="fas fa-gift"></i><p>No active resources yet.</p></div>'}
      </div></div>`;

  } else if(activeTab==='consultations'){
    const myC=DB.consultations.filter(co=>co.learnerId===uid);
    c.innerHTML=`<h2 style="font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem;">Consultations</h2>
    <div class="card"><div class="card-header"><div class="card-title">My Consultations</div></div>
    <div class="card-body">${myC.length?myC.map(co=>{const teacher=getUser(co.teacherId);return`<div class="consultation-thread"><div class="thread-header"><div class="flex-gap"><div class="dir-avatar" style="background:var(--teal);width:28px;height:28px;font-size:.7rem">${avatarChar(teacher?.name)}</div><div><div style="font-weight:700;font-size:.8rem">${esc(co.topic)}</div><div class="text-muted">From ${esc(teacher?.name||'—')}</div></div></div><span class="badge ${co.status==='active'?'badge-green':'badge-gray'}">${co.status}</span></div><div class="thread-body">${esc(co.message)}</div><div class="thread-meta"><span class="text-muted"><i class="fas fa-calendar"></i> ${formatDate(co.createdAt)}</span></div></div>`;}).join(''):'<div class="empty-state"><i class="fas fa-comments"></i><p>No consultations scheduled yet.</p></div>'}
    </div></div>`;
  }
}

function openLearnerResourceRequest(){
  const mySubs=DB.subjects.filter(s=>currentUser.subjects.includes(s.id));
  openModal(`<div class="modal-title"><i class="fas fa-paper-plane"></i> Request Resource</div>
    <div class="modal-field"><label>Subject</label><select id="m_lr_subject">${mySubs.map(s=>`<option value="${s.id}">${esc(s.name)} (Gr ${s.grade})</option>`).join('')}</select></div>
    <div class="modal-field"><label>Topic / Area of Concern</label><input type="text" id="m_lr_topic" placeholder="e.g. Functions, Algebra"></div>
    <div class="modal-field"><label>Describe what you need</label><textarea id="m_lr_message" placeholder="I need extra help with..."></textarea></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitLearnerResourceRequest()">Send Request</button></div>`);
}

function submitLearnerResourceRequest(){
  const subjectId=parseInt($('m_lr_subject').value);
  const topic=$('m_lr_topic').value.trim();
  const message=$('m_lr_message').value.trim();
  if(!topic||!message){alert('Please fill in all fields.');return;}
  DB.interventions.push({
    id:newId(),
    learnerId:currentUser.id,
    subjectId,
    topic,
    message,
    recommendation:'',
    status:'pending_admin',
    createdAt:new Date().toISOString().split('T')[0],
    type:'resource',
    initiatedBy:'learner'
  });
  // notify all school admins
  const admins=DB.users.filter(u=>u.role==='schooladmin'&&u.schoolId===currentUser.schoolId);
  admins.forEach(a=>addNotif(a.id,`${currentUser.name} has requested a resource: ${topic}`));
  closeModal();
  renderSidebarNav();
  navigateTo('resources');
}

function learnerAcceptResource(id){
  const intv=DB.interventions.find(i=>i.id===id);
  if(intv){intv.status='active';addNotif(intv.teacherId,`${currentUser.name} has accepted your resource recommendation: "${intv.recommendation}".`);}
  renderSidebarNav();navigateTo('resources');
}
function learnerDeclineResource(id){
  const intv=DB.interventions.find(i=>i.id===id);
  if(intv){DB.interventions=DB.interventions.filter(i=>i.id!==id);addNotif(intv.teacherId,`${currentUser.name} has declined your resource recommendation.`);}
  renderSidebarNav();navigateTo('resources');
}
