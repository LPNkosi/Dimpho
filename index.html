<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage Pro - School Management System</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --card-bg: #ffffff;
            --sidebar-bg: #0f172a;
            --gradient-1: linear-gradient(135deg, #4f46e5, #7c3aed);
            --gradient-2: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-3: linear-gradient(135deg, #f59e0b, #ef4444);
            --gradient-4: linear-gradient(135deg, #10b981, #06b6d4);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.2);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* ===== LOGIN PAGE ===== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #1a1a2e 100%);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: var(--gradient-1);
            opacity: 0.3;
            top: -150px;
            right: -100px;
            animation: floatBubble 8s ease-in-out infinite;
        }
        .login-container::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--gradient-2);
            opacity: 0.25;
            bottom: -120px;
            left: -80px;
            animation: floatBubble 10s ease-in-out infinite reverse;
        }
        @keyframes floatBubble {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            width: 440px;
            max-width: 95vw;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-card .logo .icon {
            font-size: 3rem;
            display: block;
            animation: bounce 1.5s ease-in-out infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }
        .login-card h1 {
            text-align: center;
            font-size: 1.8rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }
        .login-card .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--dark);
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: var(--transition);
            background: #f8fafc;
            color: var(--dark);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: #fff;
        }
        .btn {
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--gradient-1);
            color: #fff;
            width: 100%;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
        }
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }
        .btn-success {
            background: var(--gradient-4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-warning {
            background: var(--gradient-3);
            color: #fff;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-2px);
            cursor: pointer;
        }

        /* ===== MAIN LAYOUT ===== */
        .app-container {
            display: none;
            min-height: 100vh;
        }
        .app-container.active {
            display: flex;
        }
        .login-container.hidden {
            display: none;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: #fff;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }
        .sidebar .brand {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            padding: 0.5rem 0 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }
        .sidebar .brand span {
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-nav {
            list-style: none;
            flex: 1;
        }
        .sidebar-nav li {
            margin-bottom: 4px;
        }
        .sidebar-nav li a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .sidebar-nav li a:hover,
        .sidebar-nav li a.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(5px);
        }
        .sidebar-nav li a .nav-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }
        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 1rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }
        .sidebar-footer .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--gradient-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 1.5rem 2rem;
            transition: var(--transition);
            min-height: 100vh;
        }
        .page {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .page-header {
            margin-bottom: 1.8rem;
        }
        .page-header h2 {
            font-size: 1.6rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .page-header p {
            color: #64748b;
            margin-top: 0.3rem;
        }

        /* ===== CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border-left: 5px solid transparent;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .stat-card.purple {
            border-left-color: #8b5cf6;
        }
        .stat-card.blue {
            border-left-color: #3b82f6;
        }
        .stat-card.green {
            border-left-color: #10b981;
        }
        .stat-card.orange {
            border-left-color: #f59e0b;
        }
        .stat-card .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dark);
        }
        .stat-card .stat-label {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
        .stat-card .stat-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            opacity: 0.15;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }
        .card h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ===== TABLE ===== */
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        table th,
        table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        table th {
            background: #f8fafc;
            font-weight: 700;
            color: #475569;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        table tbody tr {
            transition: var(--transition);
        }
        table tbody tr:hover {
            background: #f1f5f9;
        }
        .badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }
        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }
        .badge-purple {
            background: #ede9fe;
            color: #5b21b6;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 500px;
            max-width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }
        .modal h3 {
            margin-bottom: 1.2rem;
            font-size: 1.3rem;
        }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
            transition: var(--transition);
        }
        .modal .close-btn:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }
        .modal .form-group {
            margin-bottom: 1rem;
        }

        /* ===== TOPIC TAGS ===== */
        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .topic-tag {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            border: 2px solid transparent;
            background: #f1f5f9;
            color: #475569;
        }
        .topic-tag.selected {
            border-color: var(--danger);
            background: #fee2e2;
            color: #991b1b;
            animation: pulse 0.6s ease-in-out;
        }
        .topic-tag.understood {
            border-color: var(--success);
            background: #d1fae5;
            color: #065f46;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ===== NOTIFICATION TOAST ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: #fff;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.4s ease-out;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            max-width: 400px;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .toast.success {
            border-left: 4px solid #10b981;
        }
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        .toast.info {
            border-left: 4px solid #3b82f6;
        }

        /* ===== CONSULTATION CARDS ===== */
        .consultation-card {
            background: #fff;
            border-radius: var(--radius-md);
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--primary);
            transition: var(--transition);
        }
        .consultation-card:hover {
            box-shadow: var(--shadow-md);
        }
        .consultation-card.pending {
            border-left-color: var(--warning);
        }
        .consultation-card.approved {
            border-left-color: var(--success);
        }

        /* ===== PROGRESS BAR ===== */
        .progress-bar-wrap {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease-out;
            background: var(--gradient-4);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                padding: 1rem 0.3rem;
            }
            .sidebar .brand {
                font-size: 0.8rem;
            }
            .sidebar-nav li a span:not(.nav-icon) {
                display: none;
            }
            .sidebar-nav li a {
                justify-content: center;
                padding: 0.7rem;
            }
            .sidebar-footer .user-info span {
                display: none;
            }
            .main-content {
                margin-left: 60px;
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            .modal {
                width: 95vw;
                padding: 1.2rem;
            }
        }
        @media (max-width: 480px) {
            .sidebar {
                width: 45px;
            }
            .main-content {
                margin-left: 45px;
                padding: 0.7rem;
            }
            .stat-card .stat-value {
                font-size: 1.5rem;
            }
            .login-card {
                padding: 2rem 1.2rem;
            }
        }

        .highlight-row {
            animation: highlightAnim 2s ease-out;
        }
        @keyframes highlightAnim {
            0% {
                background: #fef3c7;
            }
            100% {
                background: transparent;
            }
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }
    </style>
</head>

    <!-- ==================== MODAL OVERLAY ==================== -->

        <div class="modal" id="modalContent">

        function getData() {
            const stored = localStorage.getItem('edumanage_data');
            if (stored) return JSON.parse(stored);
            localStorage.setItem('edumanage_data', JSON.stringify(DEFAULT_DATA));
            return JSON.parse(JSON.stringify(DEFAULT_DATA));
        }

        function saveData(data) {
            localStorage.setItem('edumanage_data', JSON.stringify(data));
        }

        let currentUser = null;
        let currentPage = 'dashboard';

        // ==================== INITIALIZATION ====================
        function initApp() {

                currentUser = JSON.parse(storedUser);
                showApp();
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const role = document.getElementById('loginRole').value;
            const data = getData();

            // Find user by email and role (demo: flexible password)
            let user = data.users.find(u => u.email === email && u.role === role);
            if (!user && role) {
                // Auto-create demo user for any email with selected role
                user = {
                    id: 'u' + Date.now(),
                    name: email.split('@')[0].replace(/[^a-zA-Z]/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                    email: email,
                    password: password,
                    role: role,
                    subject: role === 'teacher' ? 'General' : undefined,
                    grade: role === 'learner' ? 'Grade 11' : undefined,
                    avatar: email.charAt(0).toUpperCase(),
                    department: role === 'hod' ? 'General' : undefined,
                    linkedLearner: role === 'parent' ? 'u4' : undefined,
                };
                data.users.push(user);
                saveData(data);
            }
            if (!user && !role) {
                showToast('Please select a role', 'error');
                return;
            }
            if (!user) {
                // fallback: match by email only
                user = data.users.find(u => u.email === email);
            }
            if (!user) {
                showToast('User not found. Check credentials or select correct role.', 'error');
                return;
            }
            currentUser = user;
            localStorage.setItem('edumanage_currentUser', JSON.stringify(currentUser));
            showToast('Welcome, ' + user.name + '! 🎉', 'success');
            showApp();
        }

        // ==================== DASHBOARD ====================

                0;

            let statsHTML = '';

                statsHTML = `
              <div class="stat-card purple"><div class="stat-value">${totalUsers}</div><div class="stat-label">Total Users</div><div class="stat-icon">👥</div></div>

            `;
            } else if (role === 'teacher') {

              <div class="stat-card blue"><div class="stat-value">${myMarks.length}</div><div class="stat-label">Marks Recorded</div><div class="stat-icon">✏️</div></div>

              <div class="stat-card green"><div class="stat-value">${myAvg}%</div><div class="stat-label">Class Average</div><div class="stat-icon">📈</div></div>
            `;
            } else if (role === 'learner') {
                const myMarks = data.marks.filter(m => m.learnerId === currentUser.id);

        function addUser(e) {
            e.preventDefault();
            const data = getData();
            const newUser = {
                id: 'u' + Date.now(),
                name: document.getElementById('newUserName').value,
                email: document.getElementById('newUserEmail').value,
                password: document.getElementById('newUserPassword').value,
                role: document.getElementById('newUserRole').value,
                avatar: document.getElementById('newUserName').value.charAt(0).toUpperCase(),
                subject: document.getElementById('newUserRole').value === 'teacher' ? document.getElementById(
                    'newUserDetail').value : undefined,
                grade: document.getElementById('newUserRole').value === 'learner' ? document.getElementById('newUserDetail')
                    .value : undefined,
                department: document.getElementById('newUserRole').value === 'hod' ? document.getElementById('newUserDetail')
                    .value : undefined,

            data.users.push(newUser);
            saveData(data);
            closeModal();
            showToast('User added successfully! ✅', 'success');
            navigateTo('users');

        function editUser(userId) {
            const data = getData();
            const user = data.users.find(u => u.id === userId);
            if (!user) return;
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalContent').innerHTML = `
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h3>✏️ Edit User</h3>
            <form onsubmit="updateUser(event, '${userId}')">
              <div class="form-group"><label>Name</label><input type="text" id="editUserName" value="${user.name}" required></div>
              <div class="form-group"><label>Email</label><input type="email" id="editUserEmail" value="${user.email}" required></div>
              <div class="form-group"><label>Role</label><select id="editUserRole">${['admin','teacher','learner','parent','hod','librarian','clerk'].map(r => `<option value="${r}" ${user.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
              <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            </form>
          `;
            modal.classList.add('active');
        }

        function updateUser(e, userId) {
            e.preventDefault();
            const data = getData();
            const user = data.users.find(u => u.id === userId);
            if (!user) return;
            user.name = document.getElementById('editUserName').value;
            user.email = document.getElementById('editUserEmail').value;
            user.role = document.getElementById('editUserRole').value;
            user.avatar = user.name.charAt(0).toUpperCase();
            saveData(data);
            closeModal();
            showToast('User updated! ✅', 'success');
            navigateTo('users');
        }

        function deleteUser(userId) {
            if (!confirm('Delete this user?')) return;
            const data = getData();
            data.users = data.users.filter(u => u.id !== userId);
            data.marks = data.marks.filter(m => m.learnerId !== userId && m.teacherId !== userId);
            data.consultations = data.consultations.filter(c => c.learnerId !== userId && c.teacherId !== userId);
            data.difficultTopics = data.difficultTopics.filter(t => t.learnerId !== userId);
            saveData(data);
            showToast('User deleted', 'info');
            navigateTo('users');
        }

        function buildAllMarksPage(data) {

                const teacher = data.users.find(u => u.id === m.teacherId);
                const pct = Math.round((m.score / m.total) * 100);
                const badgeClass = pct >= 70 ? 'badge-success' : pct >= 50 ? 'badge-warning' : 'badge-danger';
                return `
            <tr>
              <td>${learner ? learner.name : 'Unknown'}</td>
              <td>${m.subject}</td>
              <td>${m.topic}</td>
              <td>${m.score}/${m.total}</td>
              <td><span class="badge ${badgeClass}">${pct}%</span></td>
              <td>${teacher ? teacher.name : 'N/A'}</td>
              <td>${m.date}</td>

        function buildMyMarksPage(data) {

                const pct = Math.round((m.score / m.total) * 100);
                const badgeClass = pct >= 70 ? 'badge-success' : pct >= 50 ? 'badge-warning' : 'badge-danger';
                const feedback = pct >= 70 ? '🌟 Excellent!' : pct >= 50 ? '📖 Keep practicing' : '⚠️ Needs improvement';
                return `
            <tr>
              <td>${m.subject}</td><td>${m.topic}</td><td>${m.score}/${m.total}</td>
              <td><span class="badge ${badgeClass}">${pct}%</span></td>
              <td>${feedback}</td><td>${m.date}</td>
            </tr>`;
            }).join('');
            const avg = myMarks.length > 0 ? Math.round(myMarks.reduce((s, m) => s + (m.score / m.total) * 100, 0) / myMarks
                .length) : 0;
            return `
            <div class="page-header"><h2>📝 My Marks</h2><p>Your assessment results</p></div>
            <div class="stats-grid">
              <div class="stat-card blue"><div class="stat-value">${myMarks.length}</div><div class="stat-label">Assessments</div></div>

            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${avg}%;"></div></div><small>Overall: ${avg}%</small>
          `;

            if (!mark) return;
            const learners = data.users.filter(u => u.role === 'learner');
            const learnerOpts = learners.map(l =>

        function updateMark(e, markId) {

            mark.learnerId = document.getElementById('editMarkLearner').value;
            mark.subject = document.getElementById('editMarkSubject').value;
            mark.topic = document.getElementById('editMarkTopic').value;
            mark.score = parseInt(document.getElementById('editMarkScore').value);
            mark.total = parseInt(document.getElementById('editMarkTotal').value);
            mark.date = document.getElementById('editMarkDate').value;
            saveData(data);
            closeModal();

            if (!confirm('Delete this mark?')) return;
            const data = getData();
            data.marks = data.marks.filter(m => m.id !== markId);

            showToast('Mark deleted', 'info');
            navigateTo('addMarks');
        }

        // ==================== DIFFICULT TOPICS ====================
        function buildDifficultTopicsPage(data) {
            const myMarks = data.marks.filter(m => m.learnerId === currentUser.id);
            const topics = [...new Set(myMarks.map(m => ({ subject: m.subject, topic: m.topic })))];
            const flagged = data.difficultTopics.filter(t => t.learnerId === currentUser.id).map(t => t.topic);
            const topicTagsHTML = topics.map(t => {
                const isFlagged = flagged.includes(t.topic);
                return `<span class="topic-tag ${isFlagged ? 'selected' : ''}" 
              onclick="toggleDifficultTopic('${t.subject}', '${t.topic}', this)" 
              data-subject="${t.subject}" data-topic="${t.topic}">
              ${isFlagged ? '🚩' : '📘'} ${t.subject}: ${t.topic}
            </span>`;
            }).join('');
            return `
            <div class="page-header"><h2>🚩 Highlight Difficult Topics</h2><p>Click topics you don't understand — they'll be flagged for your teacher</p></div>
            <div class="card">
              <h3>📚 Your Topics</h3>
              <div class="topic-tags">${topicTagsHTML || '<p>No topics from marks yet. Marks will appear here once your teacher adds them.</p>'}</div>
            </div>
            <div class="card">
              <h3>🚩 Currently Flagged</h3>
              ${flagged.length > 0 ? flagged.map(t => `<span class="badge badge-danger" style="margin:4px;">🚩 ${t}</span>`).join(' ') : '<p>No topics flagged. Click topics above to flag them.</p>'}
            </div>
          `;
        }

        function toggleDifficultTopic(subject, topic, el) {
            const data = getData();
            const existing = data.difficultTopics.findIndex(t => t.learnerId === currentUser.id && t.topic === topic &&
                t.subject === subject);
            if (existing >= 0) {
                data.difficultTopics.splice(existing, 1);
                el.classList.remove('selected');
                showToast('Topic un-flagged ✅', 'info');
            } else {
                data.difficultTopics.push({ learnerId: currentUser.id, subject, topic, flaggedDate: new Date()
                        .toISOString().split('T')[0] });
                el.classList.add('selected');
                showToast('Topic flagged! 🚩 Teacher will be notified', 'warning');
            }
            saveData(data);
            navigateTo('difficultTopics');
        }

            let html = consults.map(c => {

            <form onsubmit="addBook(event)">
              <div class="form-group"><label>Title</label><input type="text" id="bookTitle" required></div>
              <div class="form-group"><label>Author</label><input type="text" id="bookAuthor" required></div>
              <button type="submit" class="btn btn-primary">✅ Add</button>
            </form>
          `;
            modal.classList.add('active');
        }

        function addBook(e) {
            e.preventDefault();
            const data = getData();
            data.libraryBooks.push({ id: 'b' + Date.now(), title: document.getElementById('bookTitle').value, author: document
                    .getElementById('bookAuthor').value, available: true, borrowedBy: null });
            saveData(data);
            closeModal();
            showToast('Book added! 📚', 'success');
            navigateTo('books');
        }

        function borrowBook(bookId) {
            const data = getData();
            const book = data.libraryBooks.find(b => b.id === bookId);
            if (book) { book.available = false;
                book.borrowedBy = currentUser.id;
                saveData(data);
                showToast('Book lent out', 'info');
                navigateTo('books'); }
        }

        function returnBook(bookId) {
            const data = getData();
            const book = data.libraryBooks.find(b => b.id === bookId);
            if (book) { book.available = true;
                book.borrowedBy = null;
                saveData(data);
                showToast('Book returned', 'success');
                navigateTo('books'); }
        }

        function buildBorrowedPage(data) {
            const borrowed = data.libraryBooks.filter(b => !b.available);
            return `
            <div class="page-header"><h2>📖 Borrowed Books</h2></div>
            ${borrowed.map(b => `<div class="card"><strong>${b.title}</strong> by ${b.author} | Borrower: ${data.users.find(u=>u.id===b.borrowedBy)?.name||'Unknown'}</div>`).join('') || '<div class="empty-state"><p>No books borrowed</p></div>'}
          `;
        }

        function buildFinancePage(data) {
            let rows = data.financeRecords.map(f => {
                const learner = data.users.find(u => u.id === f.learnerId);
                return `
            <tr><td>${learner?.name||'N/A'}</td><td>${f.description}</td><td>R${f.amount}</td><td><span class="badge ${f.paid?'badge-success':'badge-danger'}">${f.paid?'Paid':'Unpaid'}</span></td><td>${f.date}</td></tr>`;
            }).join('');
            return `
            <div class="page-header"><h2>💰 Finance Records</h2></div>
            <div class="card"><div class="table-container"><table><thead><tr><th>Learner</th><th>Description</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table></div></div>
          `;
        }

        function buildInvoicesPage(data) {
            const unpaid = data.financeRecords.filter(f => !f.paid);
            return `
            <div class="page-header"><h2>🧾 Invoices</h2></div>
            ${unpaid.map(f => `<div class="card"><strong>${f.description}</strong> — R${f.amount} <span class="badge badge-danger">Unpaid</span><br><small>${f.date}</small><br><button class="btn btn-sm btn-success" onclick="markPaid('${f.id}')">✅ Mark as Paid</button></div>`).join('') || '<div class="empty-state"><p>All invoices paid! 🎉</p></div>'}
          `;
        }

        function markPaid(financeId) {
            const data = getData();
            const f = data.financeRecords.find(fr => fr.id === financeId);
            if (f) { f.paid = true;
                saveData(data);
                showToast('Marked as paid! ✅', 'success');
                navigateTo('invoices'); }
        }

        // ==================== MODAL ====================
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ==================== TOAST ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `${icons[type]||'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.4s';
                setTimeout(() => toast.remove(), 400); }, 3000);
        }

        // ==================== DYNAMIC LISTENERS ====================
        function attachDynamicListeners() {
            // Re-attach any needed listeners after page navigation
            document.querySelectorAll('.topic-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    toggleDifficultTopic(this.dataset.subject, this.dataset.topic, this);
                });
            });
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if (e.ctrlKey && e.key === 'd') { e.preventDefault();
                navigateTo('dashboard'); }
            if (e.ctrlKey && e.key === 'l') { e.preventDefault();
                logout(); }
        });

        // ==================== INIT ====================
        initApp();
        if (!localStorage.getItem('edumanage_data')) {
            localStorage.setItem('edumanage_data', JSON.stringify(DEFAULT_DATA));
        }

        console.log('🎓 EduManage Pro Ready!');
        console.log('👤 Demo Logins:');
        console.log('  Admin: admin@school.com / admin123');
        console.log('  Teacher: teacher@school.com / teacher123');
        console.log('  Learner: learner@school.com / learner123');
        console.log('  Parent: parent@school.com / parent123');
        console.log('  HOD: hod@school.com / hod123');
        console.log('  Librarian: librarian@school.com / lib123');
        console.log('  Clerk: clerk@school.com / clerk123');
        console.log('💡 Or use ANY email + select a role to auto-create a demo account!');
        console.log('⌨️ Shortcuts: Esc=close modal, Ctrl+D=dashboard, Ctrl+L=logout');
    </script>
</body>
</html>
